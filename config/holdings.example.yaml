# ==========================================================================

total_assets_wan: 100.0          # 示例总资产（假）

# 锁定资产（不参与优化）
locked:
  insurance_wan: 5.0

# 大类配置目标（SAA 战略锚）——这是方法/框架，非个人数据
saa_target:
  stock: 0.37
  bond: 0.30
  commodity: 0.15
  gold: 0.03
  high_risk: 0.05
  insurance: 0.05
  cash: 0.05

# 当前各大类金额（w · 示例假数据，故意与目标有偏离，好让再平衡器有活可干）
current:
  stock_wan: 40.0
  bond_wan: 25.0
  commodity_wan: 9.0
  gold_wan: 2.0
  high_risk_wan: 0.0
  insurance_wan: 5.0
  cash_wan: 19.0

