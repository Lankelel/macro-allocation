# · 用途：仅用于演示本项目如何运行（让你不接入个人数据也能跑通全流程）。
# · 所有 *_wan（万元金额）/ total_assets 都是编造的整数，不代表任何人的真实资产。
# · 保留的 SAA 比例、基金代码、方法论注释 = 公开信息 / 项目方法，非个人隐私。
